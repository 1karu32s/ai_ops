server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md

milvus:
  host: localhost
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 10000

# Spring AI Alibaba DashScope 配置
spring:
  ai:
    dashscope:
      # 🔴 修正点 1：去掉了 ${}，直接填入 Key
      api-key: sk-d613a96523df4e84b80273d5baa525dc
      chat:
        options:
          timeout: 180000  # 超时时间180秒（3分钟）
      retry:
        max-attempts: 3  # 最大重试次数
        backoff:
          initial-interval: 2000  # 初始重试间隔2秒
          multiplier: 2  # 重试间隔倍数
          max-interval: 10000  # 最大重试间隔10秒

    # Spring AI MCP 客户端配置
    # 如果使用mock数据，请注释这部分内容
    mcp:
      client:
        enabled: true
        name: tencent-mcp-server
        version: 1.0.0
        request-timeout: 60s
        type: ASYNC
        sse:
          connections:
            tencent-cls:
              url: https://mcp-api.tencent-cloud.com
              sse-endpoint: /sse/e34f947b497929be # 完整的SSE端点路径

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: ""  # 如有密码请填写
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_ops?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root # 替换为你的数据库用户名
    password: 123456 # 替换为你的数据库密码


mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发环境建议开启日志，查看生成的 SQL
  global-config:
    db-config:
      id-type: auto # 对应数据库的主键自增

# 阿里云 DashScope Embedding API 配置
dashscope:
  api:
    # 🔴 修正点 2：去掉了 ${}，直接填入 Key
    key: sk-d613a96523df4e84b80273d5baa525dc
  embedding:
    model: text-embedding-v4  # 阿里云文本向量化模型

# 文档分片配置
document:
  chunk:
    max-size: 800  # 每个分片最大字符数
    overlap: 100   # 分片之间的重叠字符数

# RAG 配置
rag:
  top-k: 3  # 检索返回的最相似文档数量
  model: "qwen3-max"  # 大语言模型名称

# Prometheus 配置
prometheus:
  base-url: http://localhost:9090
  timeout: 10  # 超时时间（秒）
  mock-enabled: true  # 是否启用 Mock 模式（用于测试，未配置Prometheus时建议设为true）

# CLS 云日志服务配置
cls:
  mock-enabled: false  # 是否启用 Mock 模式（用于测试，设为 true 返回与告警关联的模拟日志数据）

# 对话存储配置
conversation:
  cache:
    expire-days: 7  # Redis 缓存过期时间（天）
    recent-sessions-limit: 100  # 最近会话列表最大数量
  summary:
    enabled: true  # 是否启用语义压缩
    compress-threshold: 10  # 压缩阈值（消息条数，10条=5轮对话）
    compress-batch-size: 10  # 每次压缩的消息条数
    lock-timeout-seconds: 30  # 分布式锁超时时间（秒）

# 线程池配置（根据任务类型优化）
thread:
  pool:
    # SSE 流式响应线程池
    sse:
      core-size: 32      # 核心线程数
      max-size: 64       # 最大线程数
      queue-capacity: 64 # 队列容量
    # 文档向量化线程池
    vector:
      core-size: 8       # 核心线程数
      max-size: 16       # 最大线程数
      queue-capacity: 20 # 队列容量
    # 持久化线程池
    persist:
      core-size: 32      # 核心线程数
      max-size: 64       # 最大线程数
      queue-capacity: 200 # 队列容量